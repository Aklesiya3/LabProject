<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <link rel="stylesheet" href="labstyle.css">
</head>
<body>

<div class="container">
  <h2>Login Form</h2>
  <form id="loginForm">
    
    <div class="form-group">
      <label>Phone Number</label>
      <div class="phone-prefix">
        <span>🇪🇹 +251</span>
        <input type="text" id="phone" placeholder="Enter 13-digit number" maxlength="13">
      </div>
      <div class="error" id="phoneError"></div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="8 characters, letters, digits, special">
      <div class="error" id="passwordError"></div>
    </div>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();

  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value.trim();

  const phoneError = document.getElementById('phoneError');
  const passwordError = document.getElementById('passwordError');

  phoneError.textContent = '';
  passwordError.textContent = '';

  // Phone validation: exactly 13 digits
  const phoneRegex = /^\d{13}$/;
  let valid = true;

  if(!phoneRegex.test(phone)){
    phoneError.textContent = 'Phone number must be exactly 13 digits.';
    valid = false;
  }

  // Password validation: 8 characters, letter + digit + special character
  const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8}$/;
  if(!passwordRegex.test(password)){
    passwordError.textContent = 'Password must be 8 characters with letters, digits, and 1 special character.';
    valid = false;
  }

  // If valid, redirect to welcome page
  if(valid){
    window.location.href = "labwelcome.html";
  }
});
</script>

</body>
</html>
