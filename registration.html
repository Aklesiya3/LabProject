<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="registrationstyle.css">
</head>

<body>

<div class="container">
    <h2>Registration Form</h2>

    <form action="process.php" method="POST" onsubmit="return validateAge()">
       <!-- Row 1 -->
        <div class="row">
            <div class="input-group">
                <label>First Name</label>
                <input type="text" name="fname" >
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" name="lname">
            </div>

            <div class="input-group">
                <label>Birth Date</label>
                 <input type="date" name="birthday" id="birthday">
            </div>

            <div class="input-group">
                <label>Department</label>
                <select name="department">
                    <option>Computer Science</option>
                    <option>Software Engineering</option>
                    <option>Power and Control</option>
                    <option>Communication</option>
                </select>
            </div>
        </div>

        <!-- Row 2 -->

            <div class="form-grid">

            <div class="input-group">
                <label>Gender</label>
                <div class="radio-group">
            
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>

            <div class="input-group">
                <label>Hobbies</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="hobbies[]" value="Reading"> Reading</label>
                    <label><input type="checkbox" name="hobbies[]" value="Sports"> Sports</label>
                    <label><input type="checkbox" name="hobbies[]" value="Music"> Music</label>
                    <label><input type="checkbox" name="hobbies[]" value="Travel"> Travel</label>
                </div>
            </div>
        

            <div class="input-group">
                <label>Others</label>
                <textarea class="my-textarea" rows="4"> </textarea>
            </div>
    </div>
    <p id="errorMsg" style="color:red;"></p>
    <!-- Buttons -->
        <div class="buttons">
            <button type="submit" class="register-btn">Register</button>
            <button type="reset" class="clear-btn">Clear</button>
        </div>
    </form>

</div>
<script>
function validateAge() {
    let birthDate = document.getElementById("birthday").value;
    let errorMsg = document.getElementById("errorMsg");

    errorMsg.textContent = "";

    if (birthDate === "") {
        errorMsg.textContent = "Please select your birth date";
        return false;
    }

    let today = new Date();
    let dob = new Date(birthDate);

    let age = today.getFullYear() - dob.getFullYear();
    let m = today.getMonth() - dob.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
        age--;
    }

    if (age < 18) {
        errorMsg.textContent = "You must be at least 18 years old.";
        return false;
    }

    return true;
}
</script>
</body>
</html>
